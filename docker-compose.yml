services:
  helena:
    build: .
    container_name: helena-trading-bot
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # Resource limits — ajustar según tu servidor
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M
    # Dar tiempo para cancelar órdenes antes de forzar kill
    stop_grace_period: 15s
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/state').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 60s
      timeout: 10s
      start_period: 30s
      retries: 3
